<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="rough.css">
</head>
<body>
  <div class="header">
    <div class="left-section">
      <img class="hamburger-menu" src="./7-Project-Begins/icons/hamburger-menu.svg" alt="hamberger menu">
      <img class="youtube-logo" src="./7-Project-Begins/icons/youtube-logo.svg" alt="youtube logo">
    </div>
    <div class="middle-section">
      <input class="search-bar" type="text" placeholder="Search">
      <button class="search-button">
        <img class="search-icon" src="./7-Project-Begins/icons/search.svg" alt="">
        
        <!-- tooltip inside a button -->
        <div class="tooltip">Search</div>
      </button>
      <button class="voice-search-button">
        <img class="voice-search-icon" src="./7-Project-Begins/icons/voice-search-icon.svg" alt="">
        <!-- tooltip inside a button -->
        <div class="tooltip">Search with your voice</div>
      </button>
    </div>
    <div class="right-section">
      <div class="upload-icon-container">
        <img class="upload-icon" src="./7-Project-Begins/icons/upload.svg" alt="">
        <!-- tooltip inside a button -->
        <div class="tooltip">Create</div>
      </div>
      <img class="youtube-apps-icon" src="./7-Project-Begins/icons/youtube-apps.svg" alt="">
      <img class="notifications-icon" src="./7-Project-Begins/icons/notifications.svg" alt="">
      <img class="current-user-picture" src="./7-Project-Begins/channel-pictures/my-channel.jpeg" alt="">
    </div>
  </div>
  
  <div class="sidebar">
    <div class="sidebar-link">
      <img src="./7-Project-Begins/icons/home.svg" alt="">
      <div>Home</div>
    </div>
    <div class="sidebar-link">
      <img src="./7-Project-Begins/icons/explore.svg" alt="">
      <div>Explore</div>
    </div>
    <div class="sidebar-link">
      <img src="./7-Project-Begins/icons/subscriptions.svg" alt="">
      <div>Subscriptions</div>
    </div>
    <div class="sidebar-link">
      <img src="./7-Project-Begins/icons/originals.svg" alt="">
      <div>Originals</div>
    </div>
    <div class="sidebar-link">
      <img src="./7-Project-Begins/icons/youtube-music.svg" alt="">
      <div>YouTube Music</div>
    </div>
    <div class="sidebar-link">
      <img src="./7-Project-Begins/icons/library.svg" alt="">
      <div>Library</div>
    </div>
  </div>
</body>
</html>
